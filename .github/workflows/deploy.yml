name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: CI=false npm run build
        env:
          GENERATE_SOURCEMAP: false
          # Deployed site talks to the profiles API on its own subdomain.
          # (Local dev falls back to http://localhost:4317.)
          REACT_APP_PROFILES_URL: https://api.bluechipsblockexplorer.com
          # Live-chain data source (CosmWasm smart queries). osmo-test-5
          # matches the deployed testnet contracts. If the site shows demo
          # data, this endpoint is likely not sending browser CORS headers —
          # swap it for a CORS-enabled RPC or proxy it through Caddy.
          REACT_APP_RPC_ENDPOINT: https://rpc.osmotest5.osmosis.zone

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
